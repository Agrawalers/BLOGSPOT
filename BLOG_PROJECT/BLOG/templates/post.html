<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      padding: 20px;
      
      background-color: #F8F8FF;
      color: #2c3e50;
    }

    .header {
      padding: 2px;
      font-size: 40px;
      text-align: center;
      background: white;
    }

    .leftcolumn {
      float: left;
      width: 100%;
    }

    .card {
      background-color: white;
      padding: 20px;
      margin-top: 20px;
    }

    .row:after {
      content: "";
      display: table;
      clear: both;
    }

    @media screen and (max-width: 800px) {

      .leftcolumn,
      .rightcolumn {
        width: 100%;
        padding: 0;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h2>Blogs</h2>
  </div>

  <div class="row">
    <div class="leftcolumn">
      <div class="card" style="text-decoration: none; color: black;" >
         
          <h2>{{posts.title}}</h2>
          <h5>{{posts.created}}</h5>
          <p style ="text-align: left; line-height: 2;">{{posts.body}}</p>
        
      </div>
      
    </div>
  </div>

</body>

</html>
